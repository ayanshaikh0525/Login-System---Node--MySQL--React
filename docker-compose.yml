version: "3.9"

services:

  backend:
    build: ./backend
    container_name: node-backend
    network_mode: host
    env_file:
      - ./backend/.env2
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: react-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
